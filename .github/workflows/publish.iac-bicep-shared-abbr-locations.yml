name: "publish.iac-bicep-shared-abbr-locations"

on:
  push:
    branches:
      - main
    paths:
      # Trigger on any change inside this module's folder
      - "iac-bicep-shared-abbr-locations/**"
      # Also trigger if the shared publish template itself changes
      - ".github/workflows/publish-shared.template.yml"
      - ".github/workflows/publish.iac-bicep-shared-abbr-locations.yml"

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual publish (optional)"
        required: false
        type: string

permissions:
  id-token: write
  packages: write
  contents: read

jobs:
  # gate:
  #   name: "Await Publish Approval"
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 1440  # Auto-cancels if not approved within 24 hours
  #   # -----------------------------------------------------------------------
  #   # This environment must be created in GitHub → Settings → Environments.
  #   # Add required reviewers there so a human must approve before publishing.
  #   # -----------------------------------------------------------------------
  #   environment: module-publish
  #   steps:
  #     - name: "Publish approved"
  #       run: echo "Publishing of '${{ github.workflow }}' approved by ${{ github.actor }}."

  publish:
    name: "Publish"
    # needs: gate
    uses: ./.github/workflows/publish-shared.template.yml
    with:
      module_name: iac-bicep-shared-abbr-locations
      org_name: shared-bicep-projects
      repo_name: bicep-shared-modules
    secrets: inherit
