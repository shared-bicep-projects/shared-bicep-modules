name: "publish-module.template"

on:
  workflow_call:
    inputs:
      module_name:
        description: "Folder name of the shared module under "
        required: true
        type: string
      org_name:
        description: "GitHub organization name (for GHCR namespace)"
        required: true
        type: string
      repo_name:
        description: "GitHub repository name (for GHCR namespace)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  MODULE: ${{ inputs.module_name }}
  ORG: ${{ inputs.org_name }}
  REPO: ${{ inputs.repo_name }}

jobs:
  publish:
    name: "Publish ${{ inputs.module_name }}"
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # Required for OIDC token exchange with Azure
      packages: write     # Required to publish to GitHub Container Registry (GHCR)
      contents: read      # Required to read the module files from the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module structure
        run: |
          set -euo pipefail
          if [ ! -f "$MODULE/main.bicep" ]; then
            echo "::error file=$MODULE/main.bicep::main.bicep not found in $MODULE"
            exit 1
          fi
          if [ ! -f "$MODULE/version.json" ]; then
            echo "::error file=$MODULE/version.json::version.json not found in $MODULE"
            exit 1
          fi

      - name: Resolve module version
        id: version
        run: |
          set -euo pipefail
          # major.minor comes from version.json; build number (patch) is the
          # workflow run number — auto-increments on every run, no state needed.
          FULL=$(jq -r '.version' "$MODULE/version.json")
          echo "full_version=$FULL" >> "$GITHUB_OUTPUT"
          echo "Module: $MODULE  |  Version: $FULL"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # - name: Install Radius CLI
      #   run: |
      #     wget -q "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" -O - | /bin/bash

      # - name: Publish module to GHCR
      #   env:
      #     VERSION: ${{ steps.version.outputs.full_version }}
      #   run: |
      #     set -euo pipefail
      #     TARGET="br:${REGISTRY}/${ORG}/${REPO}/${MODULE}:${VERSION}"
      #     LATEST="br:${REGISTRY}/${ORG}/${REPO}/${MODULE}:latest"
      #     echo "Publishing → $TARGET"
      #     # rad bicep publish --file "${MODULE}/main.bicep" --target "$TARGET"
      #     # echo "Successfully published ${MODULE}:${VERSION}"
      #     # rad bicep publish --file "${MODULE}/main.bicep" --target "$LATEST"
      #     # echo "Successfully published ${MODULE}:latest"

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Set up GHCR credentials for Bicep
        run: |
          mkdir -p ~/.docker
          echo "{\"credHelpers\": {\"ghcr.io\": \"desktop\"}}" > ~/.docker/config.json

      - name: Publish module to GHCR
        env:
          VERSION: ${{ steps.version.outputs.full_version }}
          DOCKER_CONFIG: ~/.docker
        run: |
          set -euo pipefail
          TARGET="br:${REGISTRY}/${ORG}/${REPO}/${MODULE}:${VERSION}"
          echo "Publishing module to:"
          echo "$TARGET"
          az bicep publish \
            --file "$MODULE/main.bicep" \
            --target "$TARGET"
